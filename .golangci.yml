version: "2"

run:
  timeout: 10m

linters:
  enable:
    - bodyclose
    - durationcheck
    - errorlint
    - revive
    - gosec
    - nakedret
    - misspell
    - nolintlint
    - unconvert
    - unparam
    - whitespace
    - gocritic

  settings:
    revive:
      confidence: 0.0

formatters:
  enable:
    - goimports
